    Projects:
      - name: A2RL Autonomous Drone Championship (2025–2026)
        summary: >
          Develop algorithms for high-speed drone racing relying exclusively on a single monocular
          RGB camera and an IMU sensor for real-time perception, navigation, and control.
          Stacks — Visual-Inertial-based Localization, Gate Detection, Model Predictive Control,
          Optimal Trajectory Planning.
        highlights:
          - Held by ASPIRE – Abu Dhabi Autonomous Racing League
          - Sept 2024 – Present, Abu Dhabi, UAE
        start_date: 2024-09
        end_date: present

      - name: 3rd Mohamed Bin Zayed International Robotics Challenge (MBZIRC)
        summary: >
          Developed autonomous drones (UAVs) and an unmanned surface vehicle (USV) to perform
          inspection and intervention tasks in a GPS-denied marine environment. Stacks —
          Localization (AprilTag-based, Optical Flow), Mission Planner, Control, Object Detection and Tracking.
        highlights:
          - Held by ASPIRE, United Arab Emirates
          - March 2023 – February 2024, Abu Dhabi, UAE
        start_date: 2023-03
        end_date: 2024-02

      - name: ADD Autonomous Drone for Battlefield Environments
        summary: >
          Developed a fully autonomous drone system for reconnaissance in a battlefield indoor environment.
          Stacks — Autonomous Exploration Algorithm, Object Detection-Localization (Euclidean Clustering), LiDAR SLAM.
        highlights:
          - Held by Republic of Korea Agency for Defense Development (ADD)
          - October 2022, Daejeon, South Korea
        start_date: 2022-10
        end_date: 2022-10

      - name: 5th Army Tiger DroneBot Mission Challenge — Indoor Reconnaissance Drone
        summary: >
          Developed a fully autonomous drone that entered a building via a second-floor window, located
          hidden objects in real time, and returned to its starting point. Stacks — Autonomous Exploration,
          Object Detection, Synthetic Dataset Generation, Real-time Video Transmission (WireGuard, LTE, Google Cloud, ZMQ), LiDAR SLAM.
        highlights:
          - Held by Republic of Korea Army Training and Doctrine Command (ROKA TRADOC)
          - Aug 2022, Daejeon, South Korea
        start_date: 2022-08
        end_date: 2022-08
